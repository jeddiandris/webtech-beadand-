<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Felhasználó Kereső</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .user-card {
            text-align: center;
            min-width: 200px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">Főoldal (Példa)</a>
        <a href="user-search.html">Felhasználók keresése</a>
    </nav>

    <div class="container">
        <h1>GitHub Felhasználó Keresés</h1>
        
        <div class="card">
            <label for="searchInput">Keresendő felhasználónév:</label>
            <input type="text" id="searchInput" placeholder="Írd be a GitHub felhasználónevet...">
            <button id="searchBtn" class="btn btn-primary">Keresés</button>
        </div>

        <div id="results" class="row">
            </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results');

        searchBtn.addEventListener('click', function() {
            const searchTerm = searchInput.value.trim();

            resultsContainer.innerHTML = '';

            if (searchTerm === '') {
                alert('A keresőmező nem lehet üres! Kérlek, adj meg egy felhasználónevet.');
                return; 
            }

            const apiUrl = `https://api.github.com/search/users?q=${searchTerm}`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Hiba történt a hálózati kérés során.');
                    }
                    return response.json();
                })
                .then(data => {
                    const users = data.items;

                    if (users.length === 0) {
                        resultsContainer.innerHTML = '<div class="col"><p>Nincs találat erre a névre.</p></div>';
                        return;
                    }

                    users.forEach(user => {

                        const userHtml = `
                            <div class="col user-card">
                                <div class="card">
                                    <img src="${user.avatar_url}" alt="${user.login} profilképe" class="profile-img">
                                    <h3>${user.login}</h3>
                                    <a href="user.html?id=${user.login}" class="btn btn-secondary">Adatlap megtekintése</a>
                                </div>
                            </div>
                        `;
                        resultsContainer.innerHTML += userHtml;
                    });
                })
                .catch(error => {
                    console.error('Hiba:', error);
                    resultsContainer.innerHTML = `<div class="col"><p style="color: red;">Hiba történt az adatok lekérésekor.</p></div>`;
                });
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });
    </script>
</body>
</html>
